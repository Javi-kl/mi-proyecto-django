<ul class="main-menu">
    <li><a href="{% url 'core:home' %}">INICIO</a></li>
    <li><a href="{% url 'core:about_us' %}">SOBRE MÍ</a></li>
    <li><a href="{% url 'core:contact' %}">CONTACTO</a></li>
    {% if not request.user.is_authenticated %}
        <li><a href="{% url 'core:register' %}">REGISTRO</a></li>
    {% endif %}
    {% if request.user.is_authenticated %}
        <form method="post" action="{% url 'core:logout' %}">
            {% csrf_token %}
            <button type="submit">CERRAR SESIÓN</button>
        </form>
    {% else %}
        <button><a href="{% url 'core:login' %}">LOGIN</a></button>
    {% endif %}
</ul>


<section class="messages">
    {% if messages %}
        {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
</section>
