{% for post in posts %}
        <article id="{{post.pk}}">
            <h2>{{post.title}}</h2>
            {% if post.blog_img %}
                <picture>
                    <img src="{{post.blog_img.thumbnails.small.url}}" alt="">
                </picture>
            {% endif%}
            <p>Fecha de publicación: {{ post.created_at}} </p>
            <div>
                {{post.content|truncatechars:100|safe}}...
            </div>
            <p><a href="{% url 'projects:project_detail' post.pk%}"> Ver proyecto completo</a></p>
        <article>
    {% endfor %}
