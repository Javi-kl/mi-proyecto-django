{% extends "layout_base.html" %}

{% block head_title %}Página Home{% endblock%}
{% block page_content%}
    <h1>Últimas noticias</h1>
    {% for post in posts %}
    <article id="{{post.pk}}">
        <h2>{{post.title}}</h2>
        <p>Fecha de publicación: {{ post.created_at}} </p>
        <div>
            {{post.content|truncatechars:100}}...
        </div>
        <p><a href="{% url 'blog:post_detail' post.pk%}"> Ver noticia completa</a></p>
        
    <article>
        
    {% endfor %}
    {% endblock %}
