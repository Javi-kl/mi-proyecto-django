{% extends "layout_base.html" %}

{% block head_title %}Editar Comentario{% endblock %}

{% block page_content %}
    <article>
        <h1>Editar Comentario</h1>
        <p><strong>Proyecto:</strong> <a href="{% url 'projects:project_detail' project.pk %}">{{ project.title }}</a></p>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Guardar cambios</button>
            <a href="{% url 'projects:project_detail' project.pk %}">Cancelar</a>
        </form>
    </article>
{% endblock %}
