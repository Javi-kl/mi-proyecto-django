events {
    worker_connections 1024;
}
http {
    include /etc/nginx/mime.types;   # ← añade esto, sin él el CSS no carga bien

    upstream django {
        server web:8000;
    }
    server {
        listen 80;
        server_name tu-dominio.com www.tu-dominio.com;

        location /static/ {
            alias /app/staticfiles/;
            expires 1y;                          # ← caché para estáticos
            add_header Cache-Control "public";
        }
        location /media/ {
            alias /app/media/;
        }
        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # ← añade esto
            proxy_set_header X-Forwarded-Proto $scheme;                    # ← y esto
        }
    }
}