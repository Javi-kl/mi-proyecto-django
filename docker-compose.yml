# =============================================================================
# ORQUESTACIÓN CON PODMAN-COMPOSE (compatible con docker-compose)
# =============================================================================
# Ejecutar con: podman-compose up -d
services:
  # ===========================================================================
  # BASE DE DATOS POSTGRESQL
  # ===========================================================================
  db:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    
    # Variables de entorno (leen de .env automáticamente)
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    
    # Volumen persistente para datos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    # Healthcheck: verifica que PostgreSQL esté listo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  # ===========================================================================
  # APLICACIÓN DJANGO
  # ===========================================================================
  web:
    build: .
    container_name: portfolio-web
    
    # Comando a ejecutar (sobrescribe CMD del Dockerfile)
    command: gunicorn personal_web.wsgi:application --bind 0.0.0.0:8000
    
    # Volúmenes: código (desarrollo) y estáticos
    volumes:
      - .:/app:Z                    # Código fuente (para desarrollo)
      - static_volume:/app/staticfiles  # Estáticos compilados
    
    # Puertos: host:contenedor
    ports:
      - "8000:8000"
    
    # Dependencias: web espera hasta que db esté "healthy"
    depends_on:
      db:
        condition: service_healthy
    
    # Variables de entorno desde .env
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db    # Nombre del servicio, no localhost
      - POSTGRES_PORT=5432
  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:Z
      - static_volume:/app/staticfiles:Z
    depends_on:
      - web
# =============================================================================
# VOLÚMENES PERSISTENTES
# =============================================================================
# Los datos sobreviven a reinicios del contenedor
volumes:
  postgres_data:
  static_volume: